<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Add Actor-Movie • Simple Movie Database</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/styles/main.css" />
    <script type="module" src="/scripts/actors-movies/add.js" defer></script>
</head>
<body>
    <header>
        <h1>Add Actor-Movie</h1>
        <nav>
            <ul>
                <li><a href="/" class="btn">Home</a></li>
                <li><a href="/actors-movies/index.html" class="btn">All</a></li>
            </ul>
        </nav>
    </header>
    <main class="container">
        <div id="status" class="status"></div>
        <form id="am-form" class="grid">
            <div class="field">
                <label for="actorId">Actor ID</label>
                <input id="actorId" name="actorId" type="number" min="1" required />
            </div>
            <div class="field">
                <label for="movieId">Movie ID</label>
                <input id="movieId" name="movieId" type="number" min="1" required />
            </div>
            <div class="field">
                <label for="role">Role</label>
                <input id="role" name="role" type="text" placeholder="e.g. Protagonist" required />
            </div>
            <div class="form-actions">
                <button class="btn primary" type="submit">Create</button>
                <a class="btn" href="/actors-movies/index.html">Cancel</a>
            </div>
        </form>
    </main>
</body>
</html>
